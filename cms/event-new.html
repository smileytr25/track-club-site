<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Editor - Genesee Swift CMS</title>
  <link rel="stylesheet" href="css-source/cms.css">
</head>
<body>
  <main class="cms-page">
    <header class="cms-header">
      <div>
        <p class="brand-kicker">Genesee Swift CMS</p>
        <h1 id="pageTitle">New Event</h1>
      </div>
      <a class="cms-link-button" href="/cms/events.html">Back to Events</a>
    </header>

    <section class="cms-workspace single">
      <article class="cms-surface">
        <h2>Event Details</h2>
        <p class="auth-message" id="eventMessage" role="status"></p>
        <form class="cms-form" id="eventForm">
          <div class="form-field">
            <label for="eventTitle">Event Title</label>
            <input id="eventTitle" name="title" type="text" placeholder="AAU Qualifier" required>
          </div>

          <div class="cms-form-grid">
            <div class="form-field">
              <label for="eventDate">Date</label>
              <input id="eventDate" name="eventDate" type="date" required>
            </div>

            <div class="form-field">
              <label for="eventTime">Time</label>
              <input id="eventTime" name="eventTime" type="time">
            </div>
          </div>

          <div class="form-field">
            <label for="eventLocation">Location</label>
            <input id="eventLocation" name="location" type="text" placeholder="Carman-Ainsworth Middle School" required>
          </div>

          <div class="form-field">
            <label for="eventStatus">Status</label>
            <select id="eventStatus" name="status">
              <option value="draft">Draft</option>
              <option value="published">Published</option>
              <option value="archived">Archived</option>
            </select>
          </div>

          <div class="form-field">
            <label for="eventDescription">Description</label>
            <textarea id="eventDescription" name="description" rows="5" placeholder="Short public-facing event summary"></textarea>
          </div>

          <button type="submit" id="saveButton">Save Event</button>
        </form>
      </article>
    </section>
  </main>

  <div class="cms-modal-backdrop" id="archiveWarningModal" hidden>
    <section class="cms-modal" role="dialog" aria-modal="true" aria-labelledby="archiveWarningTitle" aria-describedby="archiveWarningText">
      <div class="cms-modal-icon">!</div>
      <div>
        <p class="brand-kicker">Archive Warning</p>
        <h2 id="archiveWarningTitle">Are you sure you want to set the date to this?</h2>
        <p id="archiveWarningText">
          This event is being created as published with a date of today or earlier, so it will be automatically archived.
        </p>
      </div>
      <div class="cms-modal-actions">
        <button type="button" class="button-secondary" id="cancelArchiveWarning">Go Back</button>
        <button type="button" id="confirmArchiveWarning">Create Archived Event</button>
      </div>
    </section>
  </div>

  <script>
    if (!sessionStorage.getItem('cmsUser')) {
      window.location.href = '/cms/';
    }

    const form = document.getElementById('eventForm');
    const message = document.getElementById('eventMessage');
    const pageTitle = document.getElementById('pageTitle');
    const saveButton = document.getElementById('saveButton');
    const archiveWarningModal = document.getElementById('archiveWarningModal');
    const cancelArchiveWarning = document.getElementById('cancelArchiveWarning');
    const confirmArchiveWarning = document.getElementById('confirmArchiveWarning');
    const apiBase = window.location.port === '3000' ? '' : 'http://localhost:3000';
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get('id');
    const isEditing = Boolean(eventId);
    let pendingPayload = null;

    function setMessage(text, type = '') {
      message.textContent = text;
      message.className = `auth-message${type ? ` ${type}` : ''}`;
    }

    function normalizeTime(value) {
      return value ? value.slice(0, 5) : '';
    }

    function getTodayValue() {
      const today = new Date();
      today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
      return today.toISOString().slice(0, 10);
    }

    function willAutoArchive(payload) {
      return !isEditing && payload.status === 'published' && payload.eventDate <= getTodayValue();
    }

    function showArchiveWarning(payload) {
      pendingPayload = payload;
      archiveWarningModal.hidden = false;
      confirmArchiveWarning.focus();
    }

    function closeArchiveWarning() {
      archiveWarningModal.hidden = true;
      pendingPayload = null;
      saveButton.focus();
    }

    async function loadEvent() {
      if (!isEditing) return;

      pageTitle.textContent = 'Edit Event';
      saveButton.textContent = 'Update Event';
      setMessage('Loading event...');

      try {
        const response = await fetch(`${apiBase}/api/events/cms/${eventId}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Unable to load event.');
        }

        form.elements.title.value = data.event.title || '';
        form.elements.eventDate.value = data.event.eventDate || '';
        form.elements.eventTime.value = normalizeTime(data.event.eventTime);
        form.elements.location.value = data.event.location || '';
        form.elements.status.value = data.event.status || 'draft';
        form.elements.description.value = data.event.description || '';
        setMessage('');
      } catch (error) {
        setMessage(error.message, 'error');
        saveButton.disabled = true;
      }
    }

    async function saveEvent(payload) {
      setMessage(isEditing ? 'Updating event...' : 'Saving event...');

      try {
        const response = await fetch(`${apiBase}/api/events/cms${isEditing ? `/${eventId}` : ''}`, {
          method: isEditing ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Unable to save event.');
        }

        setMessage('Event saved. Returning to event list...', 'success');
        window.setTimeout(() => {
          window.location.href = '/cms/events.html';
        }, 700);
      } catch (error) {
        setMessage(error.message, 'error');
      }
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();

      const payload = Object.fromEntries(new FormData(form).entries());

      if (willAutoArchive(payload)) {
        showArchiveWarning(payload);
        return;
      }

      await saveEvent(payload);
    });

    cancelArchiveWarning.addEventListener('click', closeArchiveWarning);
    archiveWarningModal.addEventListener('click', event => {
      if (event.target === archiveWarningModal) {
        closeArchiveWarning();
      }
    });
    confirmArchiveWarning.addEventListener('click', async () => {
      const payload = pendingPayload;
      archiveWarningModal.hidden = true;
      pendingPayload = null;
      await saveEvent(payload);
    });
    window.addEventListener('keydown', event => {
      if (event.key === 'Escape' && !archiveWarningModal.hidden) {
        closeArchiveWarning();
      }
    });

    loadEvent();
  </script>
</body>
</html>
