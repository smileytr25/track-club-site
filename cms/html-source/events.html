<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Management - Genesee Swift CMS</title>
  <link rel="stylesheet" href="../css-source/cms.css">
</head>
<body>
  <main class="cms-page">
    <header class="cms-header">
      <div>
        <p class="brand-kicker">Genesee Swift CMS</p>
        <h1>Event Management</h1>
      </div>
      <div class="cms-header-actions">
        <a class="cms-link-button" href="/cms/html-source/dashboard.html">Dashboard</a>
        <a class="cms-link-button" href="/cms/html-source/event-new.html">New Event</a>
      </div>
    </header>

    <section class="cms-surface">
      <div class="event-toolbar">
        <div class="form-field">
          <label for="eventSearch">Search</label>
          <input id="eventSearch" type="search" placeholder="Search by title or location">
        </div>

        <div class="form-field">
          <label for="eventStatusFilter">Category</label>
          <select id="eventStatusFilter">
            <option value="all">All Events</option>
            <option value="published">Published</option>
            <option value="draft">Drafts</option>
            <option value="archived">Archived</option>
          </select>
        </div>

        <div class="form-field">
          <label for="eventSort">Sort By</label>
          <select id="eventSort">
            <option value="date-asc">Date: Soonest</option>
            <option value="date-desc">Date: Latest</option>
            <option value="title-asc">Title: A-Z</option>
            <option value="status">Status</option>
          </select>
        </div>
      </div>

      <div class="event-card-list" id="eventCardList">
        <div class="event-empty-state">
          <span>...</span>
          <p>Loading events</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    if (!sessionStorage.getItem('cmsUser')) {
      window.location.href = '/cms/html-source/index.html';
    }

    const searchInput = document.getElementById('eventSearch');
    const statusFilter = document.getElementById('eventStatusFilter');
    const sortSelect = document.getElementById('eventSort');
    const list = document.getElementById('eventCardList');
    const apiBase = window.location.port === '3000' ? '' : 'http://localhost:3000';
    let events = [];

    function formatDate(value) {
      return new Intl.DateTimeFormat('en-US', {
        month: 'long',
        day: 'numeric',
        year: 'numeric'
      }).format(new Date(`${value}T00:00:00`));
    }

    function formatTime(value) {
      if (!value) return 'Time TBD';
      const [hours, minutes] = value.split(':');
      return new Intl.DateTimeFormat('en-US', {
        hour: 'numeric',
        minute: '2-digit'
      }).format(new Date(2000, 0, 1, hours, minutes));
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, character => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[character]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }

    function renderEvents() {
      if (events.length === 0) {
        list.innerHTML = `
          <div class="event-empty-state">
            <span>0</span>
            <p>No CMS-managed events yet.</p>
          </div>
        `;
        return;
      }

      list.innerHTML = events.map(event => `
        <article class="cms-event-card" tabindex="0" role="link" aria-label="Edit ${escapeAttribute(event.title)}" data-id="${escapeAttribute(event.id)}" data-title="${escapeAttribute(event.title)}" data-location="${escapeAttribute(event.location)}" data-date="${escapeAttribute(event.eventDate)}" data-status="${escapeAttribute(event.status)}">
          <div>
            <p class="event-status ${escapeAttribute(event.status)}">${escapeHtml(event.status)}</p>
            <h2>${escapeHtml(event.title)}</h2>
            <p>${escapeHtml(event.location)}</p>
          </div>
          <div class="event-meta">
            <span>${formatDate(event.eventDate)}</span>
            <span>${formatTime(event.eventTime)}</span>
          </div>
        </article>
      `).join('');

      updateEvents();
    }

    function updateEvents() {
      const query = searchInput.value.trim().toLowerCase();
      const selectedStatus = statusFilter.value;
      const cards = Array.from(list.querySelectorAll('.cms-event-card'));

      cards.forEach(card => {
        const searchable = `${card.dataset.title} ${card.dataset.location}`.toLowerCase();
        const matchesSearch = !query || searchable.includes(query);
        const matchesStatus = selectedStatus === 'all' || card.dataset.status === selectedStatus;
        card.hidden = !matchesSearch || !matchesStatus;
      });

      cards.sort((a, b) => {
        if (sortSelect.value === 'date-desc') return b.dataset.date.localeCompare(a.dataset.date);
        if (sortSelect.value === 'title-asc') return a.dataset.title.localeCompare(b.dataset.title);
        if (sortSelect.value === 'status') return a.dataset.status.localeCompare(b.dataset.status);
        return a.dataset.date.localeCompare(b.dataset.date);
      });

      cards.forEach(card => list.appendChild(card));
    }

    async function loadEvents() {
      try {
        const response = await fetch(`${apiBase}/api/events/cms`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Unable to load events.');
        }

        events = data.events;
        renderEvents();
      } catch (error) {
        list.innerHTML = `
          <div class="event-empty-state">
            <span>!</span>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    searchInput.addEventListener('input', updateEvents);
    statusFilter.addEventListener('change', updateEvents);
    sortSelect.addEventListener('change', updateEvents);
    list.addEventListener('click', event => {
      const card = event.target.closest('.cms-event-card');
      if (!card) return;

      window.location.href = `/cms/html-source/event-new.html?id=${encodeURIComponent(card.dataset.id)}`;
    });
    list.addEventListener('keydown', event => {
      if (!['Enter', ' '].includes(event.key)) return;

      const card = event.target.closest('.cms-event-card');
      if (!card) return;

      event.preventDefault();
      window.location.href = `/cms/html-source/event-new.html?id=${encodeURIComponent(card.dataset.id)}`;
    });
    loadEvents();
  </script>
</body>
</html>
